name: CI/CD Pipeline (Portfolio Showcase)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint code with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Simulate GCP Deployment
        run: |
          echo "Code passed all CI checks."
          echo "Simulating deployment to Google Cloud Functions..."
          echo "gcloud functions deploy fetch_news --runtime python311 --trigger-http"
          echo "Note: Actual deployment is disabled in this public repository for security reasons."
          echo "Mock deployment successful!"
